name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # apps/blog/noteforge.config.ts refuses to load without this. The
      # value only needs to satisfy the non-empty check — typecheck/lint/test
      # do not read vault files. Adding `pnpm --filter blog build` to CI later
      # will require pointing this at a fixture vault checked into the repo.
      OBPUB_VAULT_PATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm validate:context-paths
      - run: pnpm --filter @noteforge/cli build
      - run: node packages/cli/dist/bin.js --help
